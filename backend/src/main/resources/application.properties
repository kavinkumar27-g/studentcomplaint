spring.application.name=student-complaint-management
server.port=8081

# ============================================================
# H2 In-Memory Database (No installation required)
# ============================================================
# spring.datasource.url=jdbc:h2:mem:student_complaints;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
# spring.datasource.driverClassName=org.h2.Driver
# spring.datasource.username=root
# spring.datasource.password=kavin
# spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
# spring.h2.console.enabled=true
# spring.h2.console.path=/h2-console

# ============================================================
# MySQL Database Configuration
# ============================================================
spring.datasource.url=jdbc:mysql://localhost:3306/student_complaints?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=kavin
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ============================================================
# JPA / Hibernate Configuration
# ============================================================
# update = Creates tables if they don't exist, updates schema as needed
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
# Prevents "open session in view" warning
spring.jpa.open-in-view=false

# ============================================================
# JWT Configuration
# jwt.secret: A Base64-encoded secret key (min 256 bits for HS256)
# jwt.expirationMs: 86400000 = 24 hours in milliseconds
# ============================================================
jwt.secret=9a4f2c8d3b7a1e6f45c8a0b3f267d8b1d4e6f3c8a9d2b5f8e3a9c8b5f6v8a3d9
jwt.expirationMs=86400000

# ============================================================
# File Upload Configuration
# ============================================================
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=5MB
app.upload.dir=uploads

# ============================================================
# Logging
# ============================================================
logging.level.com.example=DEBUG
logging.level.org.springframework.security=WARN
